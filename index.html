<!DOCTYPE html>
<html lang="so">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AL XIKMA - BASASKA</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; background-color: #f4f7f6; margin: 0; }
        .container { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 350px; text-align: center; border-top: 5px solid #007bff; }
        h2 { color: #2c3e50; margin-bottom: 5px; }
        select, input { width: 100%; padding: 12px; margin: 10px 0; border: 2px solid #ddd; border-radius: 10px; font-size: 16px; box-sizing: border-box; }
        .submit-btn { background-color: #007bff; color: white; padding: 15px; border: none; border-radius: 10px; cursor: pointer; width: 100%; font-size: 17px; font-weight: bold; }
        .submit-btn:disabled { background-color: #bdc3c7; cursor: not-allowed; }
        #status { margin-top: 15px; font-weight: bold; font-size: 13px; }
        #successOverlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 123, 255, 0.98); color: white; z-index: 1000; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 20px; }
    </style>
</head>
<body>

<div id="successOverlay">
    <h1 style="font-size: 50px;">✅</h1>
    <h1 id="successTitle">MAHADSANID!</h1>
    <p id="successBody" style="font-size: 20px;"></p>
    <button onclick="location.reload()" style="background: white; color: #007bff; padding: 10px 20px; border: none; border-radius: 5px; font-weight: bold; cursor: pointer;">DIB U NOQO</button>
</div>

<div class="container" id="mainContainer">
    <h2 id="schName">AL XIKMA SCHOOL</h2>
    <p style="color: #666;">Is-xaadirinta Darawalada</p>

    <select id="nameSelect"><option value="">-- Sugaya Magacyada... --</option></select>
    <select id="shiftSelect">
        <option value="">-- Dooro Xaaladda --</option>
        <option value="subax Imaansho">Subax Imaansho</option>
        <option value="rawixitaan Subax">Rawixitaan Subax</option>
        <option value="galab Imaansho">Galab Imaansho</option>
        <option value="rawixitaan Galab">Rawixitaan Galab</option>
    </select>
    <input type="password" id="passInput" placeholder="Password-kaaga">
    <button id="submitBtn" class="submit-btn" disabled>Hubinta GPS...</button>
    <div id="status">Raadinaya goobta aad joogto...</div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
    // URL-ka hoose waa kan Firebase-ka Basaska ee aad sawirka ku soo dirtay
    const firebaseConfig = { databaseURL: "https://xaadirinta-dareewalada-default-rtdb.firebaseio.com" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let SETTINGS = {};
    let DRIVER_DB = {};

    // 1. Akhriso Settings-ka
    db.ref('settings_bus').on('value', (snap) => {
        SETTINGS = snap.val() || {};
        document.getElementById('schName').innerText = SETTINGS.school_name || "AL XIKMA SCHOOL";
    });

    // 2. Akhriso Magacyada
    db.ref('staff_list').on('value', (snap) => {
        DRIVER_DB = snap.val() || {};
        const nameSelect = document.getElementById('nameSelect');
        nameSelect.innerHTML = '<option value="">-- Dooro Magacaaga --</option>';
        for (let n in DRIVER_DB) {
            let opt = document.createElement('option');
            opt.value = n; opt.text = n; nameSelect.appendChild(opt);
        }
    });

    // 3. GPS & Location
    navigator.geolocation.watchPosition((pos) => {
        const R = 6371;
        const lat1 = pos.coords.latitude, lon1 = pos.coords.longitude;
        const dLat = (SETTINGS.lat - lat1) * Math.PI / 180;
        const dLon = (SETTINGS.lon - lon1) * Math.PI / 180;
        const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180) * Math.cos(SETTINGS.lat*Math.PI/180) * Math.sin(dLon/2)**2;
        const dist = R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));

        const btn = document.getElementById('submitBtn');
        const st = document.getElementById('status');

        if (dist <= (SETTINGS.radius || 0.2)) {
            btn.disabled = false; btn.innerText = "IS-XAADIRI";
            st.innerHTML = "<span style='color: green;'>✅ Goobta waa sax.</span>";
        } else {
            btn.disabled = true;
            st.innerHTML = "<span style='color: red;'>❌ Ma joogtid iskuulka (" + (dist*1000).toFixed(0) + "m).</span>";
        }
    }, null, { enableHighAccuracy: true });

    // 4. Dirista - Halkan waxaa ku jira galka 'drivers'
    document.getElementById('submitBtn').addEventListener('click', () => {
        const name = document.getElementById('nameSelect').value;
        const shift = document.getElementById('shiftSelect').value;
        const pass = document.getElementById('passInput').value;

        if (!name || !shift || !pass) return alert("Buuxi dhamaan!");
        if (!DRIVER_DB[name] || DRIVER_DB[name].pass !== pass) return alert("Password khaldan!");

        // Is-xaadirintu waxay ku dhacaysaa galka 'drivers' ee Firebase
        db.ref('drivers').push({
            name: name, shift: shift,
            email: DRIVER_DB[name].email,
            time: firebase.database.ServerValue.TIMESTAMP
        }).then(() => {
            document.getElementById('successBody').innerHTML = "Darawal <b>" + name + "</b>, waad ku mahadsantahay is-xaadirinta.";
            document.getElementById('successOverlay').style.display = "flex";
            setTimeout(() => { location.reload(); }, 10000);
        });
    });
</script>
</body>
</html>

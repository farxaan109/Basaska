<!DOCTYPE html>
<html lang="so">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AL XIKMA - BASASKA</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; background-color: #f0f2f5; margin: 0; }
        .container { background: white; padding: 35px; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); width: 100%; max-width: 360px; text-align: center; border-top: 6px solid #007bff; position: relative; }
        h2 { color: #1a73e8; margin-bottom: 5px; text-transform: uppercase; font-size: 22px; }
        p.subtitle { color: #5f6368; margin-bottom: 25px; font-size: 14px; font-weight: 500; }
        select, input { width: 100%; padding: 14px; margin: 12px 0; border: 2px solid #e8eaed; border-radius: 12px; font-size: 16px; box-sizing: border-box; transition: 0.3s; background-color: #f8f9fa; }
        select:focus, input:focus { border-color: #007bff; outline: none; background-color: #fff; }
        .submit-btn { background-color: #007bff; color: white; padding: 16px; border: none; border-radius: 12px; cursor: pointer; width: 100%; font-size: 18px; font-weight: bold; transition: 0.3s; margin-top: 10px; }
        .submit-btn:hover:not(:disabled) { background-color: #0056b3; transform: translateY(-2px); }
        .submit-btn:disabled { background-color: #dadce0; cursor: not-allowed; }
        #status { margin-top: 18px; font-weight: 600; font-size: 14px; padding: 8px; border-radius: 8px; }
        #successOverlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(26, 115, 232, 0.98); color: white; z-index: 1000; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 20px; }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #007bff; border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite; display: inline-block; vertical-align: middle; margin-right: 8px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div id="successOverlay">
    <div style="font-size: 60px; margin-bottom: 20px;">GUUL</div>
    <h1 id="successTitle">MAHADSANID!</h1>
    <p id="successBody" style="font-size: 18px; line-height: 1.5;"></p>
    <button onclick="location.reload()" style="background: white; color: #1a73e8; padding: 12px 30px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 25px;">DIB U NOQO</button>
</div>

<div class="container" id="mainContainer">
    <h2 id="schName">AL XIKMA SCHOOL</h2>
    <p class="subtitle">Nidaamka Is-xaadirinta Darawalada</p>

    <select id="nameSelect"><option value="">-- Sugaya Magacyada... --</option></select>
    <select id="shiftSelect">
        <option value="">-- Dooro Xaaladda --</option>
        <option value="Subax Imaansho">Subax Imaansho</option>
        <option value="Rawixitaan Subax">Rawixitaan Subax</option>
        <option value="Galab Imaansho">Galab Imaansho</option>
        <option value="Rawixitaan Galab">Rawixitaan Galab</option>
    </select>
    <input type="password" id="passInput" placeholder="Geli Password-ka">
    
    <button id="submitBtn" class="submit-btn" disabled>
        <span id="btnText">Hubinta GPS...</span>
    </button>
    
    <div id="status">Raadinaya goobta...</div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
    // Config-ga Firebase
    const firebaseConfig = { 
        databaseURL: "https://xaadirinta-dareewalada-default-rtdb.firebaseio.com" 
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let SETTINGS = {};
    let DRIVER_DB = {};

    // 1. Akhriso Settings-ka
    db.ref('settings_bus').on('value', (snap) => {
        SETTINGS = snap.val() || {};
        if (SETTINGS.school_name) {
            document.getElementById('schName').innerText = SETTINGS.school_name;
        }
    });

    // 2. Akhriso Liiska Darawalada
    db.ref('staff_list').on('value', (snap) => {
        DRIVER_DB = snap.val() || {};
        const nameSelect = document.getElementById('nameSelect');
        nameSelect.innerHTML = '<option value="">-- Dooro Magacaaga --</option>';
        for (let n in DRIVER_DB) {
            let opt = document.createElement('option');
            opt.value = n; opt.text = n; 
            nameSelect.appendChild(opt);
        }
    });

    // 3. GPS Tracker
    const btn = document.getElementById('submitBtn');
    const st = document.getElementById('status');

    if ("geolocation" in navigator) {
        navigator.geolocation.watchPosition((pos) => {
            const R = 6371; // Dhulka gacankiisa (km)
            const lat1 = pos.coords.latitude, lon1 = pos.coords.longitude;
            
            // Haddii SETTINGS aysan weli soo ramin, isticmaal 0
            const targetLat = SETTINGS.lat || 0;
            const targetLon = SETTINGS.lon || 0;
            const radius = SETTINGS.radius || 0.2;

            const dLat = (targetLat - lat1) * Math.PI / 180;
            const dLon = (targetLon - lon1) * Math.PI / 180;
            const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180) * Math.cos(targetLat*Math.PI/180) * Math.sin(dLon/2)**2;
            const dist = R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));

            if (dist <= radius) {
                btn.disabled = false;
                document.getElementById('btnText').innerText = "IS-XAADIRI";
                st.innerHTML = "<span style='color: #28a745;'>Goobta waa sax (Gudaha Iskuulka)</span>";
                st.style.backgroundColor = "#e6f4ea";
            } else {
                btn.disabled = true;
                document.getElementById('btnText').innerText = "Amni ahaan waa xiran tahay";
                st.innerHTML = "<span style='color: #d93025;'>Ma joogtid iskuulka (" + (dist*1000).toFixed(0) + "m)</span>";
                st.style.backgroundColor = "#fce8e6";
            }
        }, (err) => {
            st.innerHTML = "<span style='color: #d93025;'>Fadlan shid GPS-ka taleefanka</span>";
        }, { enableHighAccuracy: true });
    }

    // 4. Dirista Xogta
    btn.addEventListener('click', () => {
        const name = document.getElementById('nameSelect').value;
        const shift = document.getElementById('shiftSelect').value;
        const pass = document.getElementById('passInput').value;

        if (!name || !shift || !pass) {
            alert("Fadlan buuxi dhamaan meelaha banaan!");
            return;
        }

        if (!DRIVER_DB[name] || DRIVER_DB[name].pass !== pass) {
            alert("Password-ka aad gelisay waa khalad!");
            return;
        }

        // Muuji animation-ka dirista
        btn.disabled = true;
        document.getElementById('btnText').innerHTML = '<div class="loader"></div> Diraya...';

        db.ref('drivers').push({
            name: name, 
            shift: shift,
            email: DRIVER_DB[name].email || "",
            time: firebase.database.ServerValue.TIMESTAMP
        }).then(() => {
            document.getElementById('successBody').innerHTML = "Darawal <b>" + name + "</b>,<br>Xogtaada si guul leh ayaa loo diwaangeliyey.";
            document.getElementById('successOverlay').style.display = "flex";
            // Dib u bilaabo bogga 8 ilbiriqsi ka dib
            setTimeout(() => { location.reload(); }, 8000);
        }).catch((error) => {
            alert("Cilad ayaa dhacday: " + error.message);
            location.reload();
        });
    });
</script>
</body>
</html>
